# MyInvoice.cz — Docker Compose pro produkci s pre-built image z GHCR
#
# Použití (žádné klonování repa potřeba):
#
#   curl -O https://raw.githubusercontent.com/radekhulan/myinvoice/master/docker-compose.production.yml
#   curl -O https://raw.githubusercontent.com/radekhulan/myinvoice/master/cfg.sample.php
#   mv docker-compose.production.yml docker-compose.yml
#   cp cfg.sample.php cfg.docker.php
#   # uprav cfg.docker.php: db.host=db, db.user=myinvoice, db.pass=…,
#   # app.pepper, secret_encryption_key (oboje openssl rand -base64 32)
#   echo "DB_PASSWORD=$(openssl rand -base64 28)" > .env
#   echo "DB_ROOT_PASSWORD=$(openssl rand -base64 28)" >> .env
#   docker compose up -d
#   docker compose exec app php api/bin/migrate.php
#   # otevři http://localhost:8080 → setup wizard
#
# Pro update na novější verzi: změň :latest na konkrétní verzi (např. :1.3.0),
# pak `docker compose pull && docker compose up -d` + `migrate.php`.

services:
  app:
    image: ghcr.io/radekhulan/myinvoice:latest   # pin na konkrétní verzi v produkci, např. :1.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      # OPTIONAL — image už obsahuje stub `cfg.php`. Pro full-ENV deploy (Railway,
      # Heroku, Fly.io) lze tento mount vynechat a vše předat přes ENV (12-factor).
      - ./cfg.docker.php:/var/www/html/cfg.php:ro
      # Default 3-volume layout (kompatibilní s 3.1.x). Pro single-volume mód
      # (PaaS, Railway, Heroku, Fly.io) použij `docker-compose.single-volume.yml`
      # override (nastaví `MYINVOICE_DATA_DIR=/data` a vymění volumes za jediný
      # `app-data:/data`). Detaily viz manual/19_Aktualizace.md § 19.5.
      - app-log:/var/www/html/log
      - app-storage:/var/www/html/storage
      - app-private:/var/www/html/private
    environment:
      TZ: Europe/Prague

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
      MARIADB_DATABASE: ${DB_NAME:-myinvoice}
      MARIADB_USER: ${DB_USER:-myinvoice}
      MARIADB_PASSWORD: ${DB_PASSWORD:-changeme}
      TZ: Europe/Prague
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  db-data:
  app-log:
  app-storage:
  app-private:
  redis-data:
